apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cashflow-gateway
  namespace: cashflow
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.cashflow.local
    secretName: cashflow-tls
  rules:
  - host: api.cashflow.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
