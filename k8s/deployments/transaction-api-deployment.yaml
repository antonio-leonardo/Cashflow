apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-api
  namespace: cashflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-api
  template:
    metadata:
      labels:
        app: transaction-api
    spec:
      containers:
      - name: transaction-api
        image: ghcr.io/antonio-leonardo/cashflow-transaction-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: ConnectionStrings__Postgres
          valueFrom:
            secretKeyRef:
              name: cashflow-secrets
              key: CONNECTIONSTRINGS__POSTGRES
        - name: RabbitMq__Host
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: RABBITMQ_HOST
        - name: RabbitMq__Port
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: RABBITMQ_PORT
        - name: RabbitMq__Username
          valueFrom:
            secretKeyRef:
              name: cashflow-secrets
              key: RABBITMQ__USERNAME
        - name: RabbitMq__Password
          valueFrom:
            secretKeyRef:
              name: cashflow-secrets
              key: RABBITMQ__PASSWORD
        - name: Keycloak__Authority
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: KEYCLOAK_AUTHORITY
        - name: Keycloak__Audience
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: KEYCLOAK_AUDIENCE
        - name: OpenTelemetry__Otlp__Endpoint
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: OTEL_ENDPOINT
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
