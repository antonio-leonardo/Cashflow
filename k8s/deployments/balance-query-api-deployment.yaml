apiVersion: apps/v1
kind: Deployment
metadata:
  name: balance-query-api
  namespace: cashflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: balance-query-api
  template:
    metadata:
      labels:
        app: balance-query-api
    spec:
      containers:
      - name: balance-query-api
        image: ghcr.io/antonio-leonardo/cashflow-balance-query-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: Redis__Connection
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: REDIS_CONNECTION
        - name: Keycloak__Authority
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: KEYCLOAK_AUTHORITY
        - name: Keycloak__Audience
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: KEYCLOAK_AUDIENCE
        - name: OpenTelemetry__Otlp__Endpoint
          valueFrom:
            configMapKeyRef:
              name: cashflow-config
              key: OTEL_ENDPOINT
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
