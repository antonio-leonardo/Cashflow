name: Cashflow — Azure Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'Back.End/**'
      - 'infra/azure/**'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [ dev, staging, prod ]
      image_tag:
        description: 'Image tag (default: git SHA)'
        required: false

# Least-privilege OIDC — no long-lived credentials in repo.
permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}          # e.g. cashflowacr.azurecr.io
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}        # e.g. rg-cashflow
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Build & push images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: dotnet build Cashflow.slnx --configuration Release --no-incremental

      - name: Build & push — Gateway
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-gateway:${{ env.IMAGE_TAG }}

      - name: Build & push — Balance API
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Service/Balance/API/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-balance-api:${{ env.IMAGE_TAG }}

      - name: Build & push — Transaction API
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Service/Transaction/API/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-transaction-api:${{ env.IMAGE_TAG }}

      - name: Build & push — Worker Balance
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Worker/Balance/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-worker-balance:${{ env.IMAGE_TAG }}

      - name: Build & push — Worker Audit
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Worker/Audit/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-worker-audit:${{ env.IMAGE_TAG }}

      - name: Build & push — Worker Report
        uses: docker/build-push-action@v6
        with:
          context: Back.End
          file: Back.End/Worker/Report/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/cashflow-worker-report:${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────────────────────
  deploy-infra:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Deploy Container Apps (${{ env.DEPLOY_ENV }})
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if (drift check)
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  infra/azure/main.bicep \
            --parameters     infra/azure/main.parameters.json \
            --parameters     imageTag=${{ env.IMAGE_TAG }} \
                             environment=${{ env.DEPLOY_ENV }}

      - name: Bicep deploy
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file  infra/azure/main.bicep \
            --parameters     infra/azure/main.parameters.json \
            --parameters     imageTag=${{ env.IMAGE_TAG }} \
                             environment=${{ env.DEPLOY_ENV }} \
            --mode           Incremental

  # ─────────────────────────────────────────────────────────────────────────────
  smoke-tests:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Smoke tests against deployed environment
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Gateway FQDN
        id: fqdn
        run: |
          FQDN=$(az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name main \
            --query properties.outputs.gatewayFqdn.value -o tsv)
          echo "fqdn=${FQDN}" >> $GITHUB_OUTPUT

      - name: Health check — Gateway liveness
        run: |
          curl --fail --max-time 30 \
            "https://${{ steps.fqdn.outputs.fqdn }}/health/live"

      - name: Health check — Gateway readiness
        run: |
          curl --fail --max-time 30 \
            "https://${{ steps.fqdn.outputs.fqdn }}/health/ready"
