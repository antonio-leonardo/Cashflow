name: SonarQube Analysis

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: Code Smells And Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate Sonar configuration
      env:
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}
      run: |
        set -euo pipefail
        missing=0
        repo_name="${GITHUB_REPOSITORY#*/}"

        if [ -z "${SONAR_HOST_URL:-}" ]; then
          echo "::error::Missing repository variable SONAR_HOST_URL"
          missing=1
        fi

        if [ -z "${SONAR_TOKEN:-}" ]; then
          echo "::error::Missing repository secret SONAR_TOKEN"
          missing=1
        fi

        if [ -z "${SONAR_ORGANIZATION:-}" ]; then
          echo "::error::Missing repository secret SONAR_ORGANIZATION"
          missing=1
        fi

        if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
          SONAR_PROJECT_KEY="${SONAR_ORGANIZATION}_${repo_name}"
          echo "::warning::Repository variable SONAR_PROJECT_KEY not set. Falling back to '${SONAR_PROJECT_KEY}'."
        fi

        if [ -z "${SONAR_PROJECT_NAME:-}" ]; then
          SONAR_PROJECT_NAME="${repo_name}"
        fi

        if [ "$missing" -eq 0 ]; then
          sonar_branches_api="${SONAR_HOST_URL%/}/api/project_branches/list?project=${SONAR_PROJECT_KEY}"
          http_code=$(curl -sS -u "${SONAR_TOKEN}:" -o sonar_project_branches.json -w "%{http_code}" "${sonar_branches_api}")

          if [ "${http_code}" -ne 200 ]; then
            echo "::error::Unable to access Sonar project '${SONAR_PROJECT_KEY}' in organization '${SONAR_ORGANIZATION}'. Configure SONAR_PROJECT_KEY with the exact SonarCloud project key."
            missing=1
          elif ! grep -q '"isMain":true' sonar_project_branches.json; then
            echo "::error::Sonar project '${SONAR_PROJECT_KEY}' has no default branch yet. Run analysis on main branch first."
            missing=1
          fi
        fi

        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

        echo "SONAR_PROJECT_KEY_EFFECTIVE=${SONAR_PROJECT_KEY}" >> "$GITHUB_ENV"
        echo "SONAR_PROJECT_NAME_EFFECTIVE=${SONAR_PROJECT_NAME}" >> "$GITHUB_ENV"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install SonarScanner for .NET
      run: |
        dotnet tool install dotnet-sonarscanner --tool-path ./.dotnet/tools \
        || dotnet tool update dotnet-sonarscanner --tool-path ./.dotnet/tools

    - name: Sonar Begin
      env:
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      run: |
        ./.dotnet/tools/dotnet-sonarscanner begin \
          /k:"${SONAR_PROJECT_KEY_EFFECTIVE}" \
          /o:"${SONAR_ORGANIZATION}" \
          /n:"${SONAR_PROJECT_NAME_EFFECTIVE}" \
          /d:sonar.host.url="${SONAR_HOST_URL}" \
          /d:sonar.token="${SONAR_TOKEN}" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.g.cs,**/*.designer.cs" \
          /d:sonar.cs.vstest.reportsPaths="**/TestResults/**/*.trx" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

    - name: Restore
      run: dotnet restore Cashflow.slnx

    - name: Build
      run: dotnet build Cashflow.slnx --configuration Release --no-restore --no-incremental

    - name: Test (TRX)
      run: dotnet test Cashflow.slnx --configuration Release --no-build -m:1 --logger "trx;LogFileName=sonar-tests.trx" --collect "XPlat Code Coverage;Format=opencover"

    - name: Sonar End
      if: ${{ always() }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./.dotnet/tools/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
