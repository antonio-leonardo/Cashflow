name: SonarQube Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'task/**'

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: Code Smells And Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate Sonar configuration
      env:
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}
      run: |
        set -euo pipefail
        missing=0
        repo_name="${GITHUB_REPOSITORY#*/}"
        sonar_host_url="${SONAR_HOST_URL%/}"
        resolved_project_key=""

        if [ -z "${SONAR_HOST_URL:-}" ]; then
          echo "::error::Missing repository variable SONAR_HOST_URL"
          missing=1
        fi

        if [ -z "${SONAR_TOKEN:-}" ]; then
          echo "::error::Missing repository secret SONAR_TOKEN"
          missing=1
        fi

        if [ -z "${SONAR_ORGANIZATION:-}" ]; then
          echo "::error::Missing repository secret SONAR_ORGANIZATION"
          missing=1
        fi

        if [ -z "${SONAR_PROJECT_NAME:-}" ]; then
          SONAR_PROJECT_NAME="${repo_name}"
        fi

        if [ "$missing" -eq 0 ]; then
          candidate_key="${SONAR_PROJECT_KEY:-${SONAR_ORGANIZATION}_${repo_name}}"
          if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
            echo "::warning::Repository variable SONAR_PROJECT_KEY not set. Falling back to '${candidate_key}'."
          fi

          project_http_code=$(curl -sS -u "${SONAR_TOKEN}:" -G \
            --data-urlencode "organization=${SONAR_ORGANIZATION}" \
            --data-urlencode "projects=${candidate_key}" \
            -o sonar_project_exact.json -w "%{http_code}" \
            "${sonar_host_url}/api/projects/search")

          if [ "${project_http_code}" -ne 200 ]; then
            echo "::error::Unable to query SonarCloud projects (HTTP ${project_http_code}). Verify SONAR_HOST_URL, SONAR_TOKEN and SONAR_ORGANIZATION."
            missing=1
          fi

          exact_count="0"
          if [ "$missing" -eq 0 ]; then
            exact_count=$(python - <<'PY'
import json
try:
    with open("sonar_project_exact.json", "r", encoding="utf-8") as f:
        data = json.load(f)
except Exception:
    print("0")
    raise SystemExit(0)
print(len(data.get("components", [])))
PY
)
          fi

          if [ "$missing" -eq 0 ] && [ "${exact_count}" -eq 0 ]; then
            if [ -n "${SONAR_PROJECT_KEY:-}" ]; then
              echo "::error::SONAR_PROJECT_KEY='${candidate_key}' was not found in organization '${SONAR_ORGANIZATION}'."
              missing=1
            else
              search_http_code=$(curl -sS -u "${SONAR_TOKEN}:" -G \
                --data-urlencode "organization=${SONAR_ORGANIZATION}" \
                --data-urlencode "q=${repo_name}" \
                --data-urlencode "ps=100" \
                -o sonar_project_search.json -w "%{http_code}" \
                "${sonar_host_url}/api/projects/search")

              if [ "${search_http_code}" -ne 200 ]; then
                echo "::error::Unable to search SonarCloud project by repository name '${repo_name}' (HTTP ${search_http_code})."
                missing=1
              else
                resolved_project_key=$(REPO_NAME="${repo_name}" python - <<'PY'
import json
import os
repo_name = os.environ["REPO_NAME"].lower()
with open("sonar_project_search.json", "r", encoding="utf-8") as f:
    data = json.load(f)
components = data.get("components", [])
exact = [c.get("key", "") for c in components if c.get("name", "").lower() == repo_name and c.get("key")]
if exact:
    print(exact[0])
elif len(components) == 1 and components[0].get("key"):
    print(components[0]["key"])
else:
    print("")
PY
)

                if [ -z "${resolved_project_key}" ]; then
                  echo "::error::Could not auto-resolve SONAR_PROJECT_KEY for repository '${repo_name}'. Configure vars.SONAR_PROJECT_KEY explicitly."
                  missing=1
                else
                  echo "::notice::Auto-resolved SONAR_PROJECT_KEY='${resolved_project_key}'."
                fi
              fi
            fi
          elif [ "$missing" -eq 0 ]; then
            resolved_project_key="${candidate_key}"
          fi

          if [ "$missing" -eq 0 ]; then
            sonar_branches_http_code=$(curl -sS -u "${SONAR_TOKEN}:" -G \
              --data-urlencode "project=${resolved_project_key}" \
              -o sonar_project_branches.json -w "%{http_code}" \
              "${sonar_host_url}/api/project_branches/list")

            if [ "${sonar_branches_http_code}" -ne 200 ]; then
              echo "::error::Unable to access Sonar project '${resolved_project_key}' in organization '${SONAR_ORGANIZATION}' (HTTP ${sonar_branches_http_code})."
              missing=1
            elif ! grep -q '"isMain":true' sonar_project_branches.json; then
              echo "::error::Sonar project '${resolved_project_key}' has no default branch yet. Run analysis on main branch first."
              missing=1
            fi
          fi

          if [ "$missing" -eq 0 ]; then
            qg_http_code=$(curl -sS -u "${SONAR_TOKEN}:" -G \
              --data-urlencode "projectKey=${resolved_project_key}" \
              -o sonar_qualitygate_precheck.json -w "%{http_code}" \
              "${sonar_host_url}/api/qualitygates/project_status")

            if [ "${qg_http_code}" -ne 200 ]; then
              echo "::error::SONAR_TOKEN cannot read Quality Gate for project '${resolved_project_key}' (HTTP ${qg_http_code}). Use a user token with access to this project."
              missing=1
            fi
          fi
        fi

        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

        echo "SONAR_PROJECT_KEY_EFFECTIVE=${resolved_project_key}" >> "$GITHUB_ENV"
        echo "SONAR_PROJECT_NAME_EFFECTIVE=${SONAR_PROJECT_NAME}" >> "$GITHUB_ENV"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install SonarScanner for .NET
      run: |
        dotnet tool install dotnet-sonarscanner --tool-path ./.dotnet/tools \
        || dotnet tool update dotnet-sonarscanner --tool-path ./.dotnet/tools

    - name: Sonar Begin
      env:
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      run: |
        ./.dotnet/tools/dotnet-sonarscanner begin \
          /k:"${SONAR_PROJECT_KEY_EFFECTIVE}" \
          /o:"${SONAR_ORGANIZATION}" \
          /n:"${SONAR_PROJECT_NAME_EFFECTIVE}" \
          /d:sonar.host.url="${SONAR_HOST_URL}" \
          /d:sonar.token="${SONAR_TOKEN}" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.newCode.referenceBranch=main \
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.g.cs,**/*.designer.cs" \
          /d:sonar.coverage.exclusions="**/Program.cs" \
          /d:sonar.cpd.exclusions="**/Program.cs" \
          /d:sonar.cs.vstest.reportsPaths="**/TestResults/**/*.trx" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

    - name: Restore
      run: dotnet restore Cashflow.slnx

    - name: Build
      run: dotnet build Cashflow.slnx --configuration Release --no-restore --no-incremental

    - name: Test (TRX)
      run: dotnet test Cashflow.slnx --configuration Release --no-build -m:1 --logger "trx;LogFileName=sonar-tests.trx" --collect "XPlat Code Coverage;Format=opencover"

    - name: Sonar End
      if: ${{ always() }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        set -euo pipefail
        max_attempts=3

        for attempt in $(seq 1 "${max_attempts}"); do
          echo "Running Sonar End (attempt ${attempt}/${max_attempts})..."
          set +e
          ./.dotnet/tools/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}" 2>&1 | tee "sonar-end-attempt-${attempt}.log"
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "${exit_code}" -eq 0 ]; then
            echo "Sonar End completed successfully."
            exit 0
          fi

          if grep -q "Project not found" "sonar-end-attempt-${attempt}.log" && [ "${attempt}" -lt "${max_attempts}" ]; then
            wait_seconds=$((attempt * 20))
            echo "::warning::SonarCloud returned 'Project not found' while checking Quality Gate. Retrying in ${wait_seconds}s."
            sleep "${wait_seconds}"
            continue
          fi

          echo "::error::Sonar End failed on attempt ${attempt} with exit code ${exit_code}."
          exit "${exit_code}"
        done

        echo "::error::Sonar End failed after ${max_attempts} attempts."
        exit 1
