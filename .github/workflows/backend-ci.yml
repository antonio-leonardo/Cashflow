name: Cashflow Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests (isolated and sequential)
      shell: bash
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"
        TESTCONTAINERS_REUSE_ENABLE: "false"
        TESTCONTAINERS_RYUK_DISABLED: "false"
      run: |
        set -euo pipefail

        cleanup_testcontainers() {
          echo "Cleaning Testcontainers resources..."
          docker ps -aq --filter "label=org.testcontainers" | xargs -r docker rm -f
          docker network ls -q --filter "label=org.testcontainers" | xargs -r docker network rm
          docker volume ls -q --filter "label=org.testcontainers" | xargs -r docker volume rm -f
        }

        run_test_project() {
          local project="$1"
          local max_attempts=2

          for attempt in $(seq 1 "${max_attempts}"); do
            echo "==> Running test project: ${project} (attempt ${attempt}/${max_attempts})"

            if dotnet test "${project}" --configuration Release --no-build --verbosity normal -m:1; then
              return 0
            fi

            if [[ "${attempt}" -lt "${max_attempts}" ]]; then
              echo "Test project failed, retrying after cleanup: ${project}"
              cleanup_testcontainers
              sleep 5
            fi
          done

          echo "Test project failed after ${max_attempts} attempts: ${project}"
          return 1
        }

        projects=(
          "Back.End/Tests/DomainTests/Balance/Balance.Domain.Tests.csproj"
          "Back.End/Tests/DomainTests/Transaction/Transaction.Domain.Tests.csproj"
          "Back.End/Tests/ConcurrencyTests/Transaction/Transaction.Concurrency.Tests.csproj"
          "Back.End/Tests/ContractTests/Gateway/Gateway.Transaction.ContractTests.csproj"
          "Back.End/Tests/IntegrationTests/Transaction/Transaction.Integration.Tests.csproj"
          "Back.End/Tests/IntegrationTests/Worker/Worker.Integration.Tests.csproj"
          "Back.End/Tests/IntegrationTests/Messaging/Messaging.Integration.Tests.csproj"
          "Back.End/Tests/E2E/Balance/E2E.Balance.Tests.csproj"
          "Back.End/Tests/E2E/Audit/E2E.Audit.Test.csproj"
          "Back.End/Tests/E2E/Report/E2E.Report.Test.csproj"
          "Back.End/Tests/IntegrationTests/Holistic/Holistic.Integration.Tests.csproj"
          "Back.End/Tests/Performance/k6/K6.Performance.Tests.csproj"
        )

        cleanup_testcontainers

        for project in "${projects[@]}"; do
          run_test_project "${project}"
          cleanup_testcontainers
        done

    - name: Build Docker Images
      run: |
        echo "Building Gateway..."
        docker build \
          -t gateway \
          -f ./Back.End/Gateway/Dockerfile \
          .
          
        echo "Building API..."
        docker build \
          -t transaction-api \
          -f ./Back.End/Service/Transaction/API/Dockerfile \
          .
          
        echo "Building Worker Audit..."
        docker build \
          -t audit-worker \
          -f ./Back.End/Worker/Audit/Dockerfile \
          .

        echo "Building Worker Balance..."
        docker build \
          -t balance-worker \
          -f ./Back.End/Worker/Balance/Dockerfile \
          .
          
        echo "Building Worker Report..."
        docker build \
          -t report-worker \
          -f ./Back.End/Worker/Report/Dockerfile \
          .

        echo "Building Worker Outbox..."
        docker build \
          -t worker-outbox \
          -f ./Back.End/Outbox/Worker/Dockerfile \
          .
