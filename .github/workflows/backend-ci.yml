name: Cashflow Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test --verbosity normal

    - name: Build Docker Images
      run: |
        echo "Building Gateway..."
        docker build \
          -t gateway \
          -f ./Back.End/Gateway/Dockerfile \
          .
          
        echo "Building API..."
        docker build \
          -t transaction-api \
          -f ./Back.End/Service/Transaction/API/Dockerfile \
          .
          
        echo "Building Worker Audit..."
        docker build \
          -t audit-worker \
          -f ./Back.End/Worker/Audit/Dockerfile \
          .

        echo "Building Worker Balance..."
        docker build \
          -t balance-worker \
          -f ./Back.End/Worker/Balance/Dockerfile \
          .
          
        echo "Building Worker Report..."
        docker build \
          -t report-worker \
          -f ./Back.End/Worker/Report/Dockerfile \
          .

        echo "Building Worker Outbox..."
        docker build \
          -t worker-outbox \
          -f ./Back.End/Outbox/Worker/Dockerfile \
          .