name: Cashflow Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests (isolated and sequential)
      shell: bash
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"
        TESTCONTAINERS_REUSE_ENABLE: "false"
        TESTCONTAINERS_RYUK_DISABLED: "false"
      run: |
        set -euo pipefail

        cleanup_testcontainers() {
          echo "Cleaning Testcontainers resources..."
          docker ps -aq --filter "label=org.testcontainers" | xargs -r docker rm -f
          docker network ls -q --filter "label=org.testcontainers" | xargs -r docker network rm
          docker volume ls -q --filter "label=org.testcontainers" | xargs -r docker volume rm -f
        }

        run_test_project() {
          local project="$1"
          # Optional filter expression passed as second argument.
          # Example: "Category!=ServiceBusEmulator&Category!=CosmosEmulator"
          local filter="${2:-}"
          local max_attempts=2

          for attempt in $(seq 1 "${max_attempts}"); do
            echo "==> Running test project: ${project} (attempt ${attempt}/${max_attempts})"

            local filter_args=()
            if [[ -n "${filter}" ]]; then
              filter_args=(--filter "${filter}")
            fi

            if dotnet test "${project}" --configuration Release --no-build --verbosity normal -m:1 "${filter_args[@]}"; then
              return 0
            fi

            if [[ "${attempt}" -lt "${max_attempts}" ]]; then
              echo "Test project failed, retrying after cleanup: ${project}"
              cleanup_testcontainers
              sleep 5
            fi
          done

          echo "Test project failed after ${max_attempts} attempts: ${project}"
          return 1
        }

        # Tests that require the Service Bus Emulator (SQL Server sidecar) or the Cosmos DB
        # Emulator are excluded on resource-constrained runners.  They can be re-enabled by
        # removing the filter or by running with Category=ServiceBusEmulator / CosmosEmulator
        # in a dedicated job that has more memory available.
        EMULATOR_EXCLUSIONS="Category!=ServiceBusEmulator&Category!=CosmosEmulator"

        projects=(
          # project path | optional xUnit filter (empty = run all)
          "Back.End/Tests/ContractTests/Balance/Balance.Query.ContractTests.csproj|"
          "Back.End/Tests/DomainTests/Balance/Balance.Domain.Tests.csproj|"
          "Back.End/Tests/DomainTests/Functions/Functions.Domain.Tests.csproj|"
          "Back.End/Tests/DomainTests/Transaction/Transaction.Domain.Tests.csproj|"
          "Back.End/Tests/ConcurrencyTests/Transaction/Transaction.Concurrency.Tests.csproj|"
          "Back.End/Tests/ContractTests/Gateway/Gateway.Transaction.ContractTests.csproj|"
          "Back.End/Tests/IntegrationTests/Balance/Balance.Integration.Tests.csproj|"
          "Back.End/Tests/IntegrationTests/Transaction/Transaction.Integration.Tests.csproj|"
          "Back.End/Tests/IntegrationTests/Worker/Worker.Integration.Tests.csproj|"
          "Back.End/Tests/IntegrationTests/Messaging/Messaging.Integration.Tests.csproj|${EMULATOR_EXCLUSIONS}"
          "Back.End/Tests/IntegrationTests/Storage/Storage.Integration.Tests.csproj|"
          "Back.End/Tests/E2E/Balance/E2E.Balance.Tests.csproj|"
          "Back.End/Tests/E2E/Audit/E2E.Audit.Test.csproj|"
          "Back.End/Tests/E2E/Report/E2E.Report.Test.csproj|"
          "Back.End/Tests/IntegrationTests/Holistic/Holistic.Integration.Tests.csproj|"
          "Back.End/Tests/Performance/k6/K6.Performance.Tests.csproj|"
        )

        cleanup_testcontainers

        for entry in "${projects[@]}"; do
          # Split "path|filter" on the pipe character
          project="${entry%%|*}"
          filter="${entry##*|}"
          run_test_project "${project}" "${filter}"
          cleanup_testcontainers
        done

    - name: Build Docker Images
      run: |
        echo "Building Gateway..."
        docker build \
          -t gateway \
          -f ./Back.End/Gateway/Dockerfile \
          ./Back.End
          
        echo "Building API..."
        docker build \
          -t transaction-api \
          -f ./Back.End/Service/Transaction/API/Dockerfile \
          ./Back.End

        echo "Building Balance Query API..."
        docker build \
          -t balance-query-api \
          -f ./Back.End/Service/Balance/API/Dockerfile \
          ./Back.End
          
        echo "Building Worker Audit..."
        docker build \
          -t audit-worker \
          -f ./Back.End/Worker/Audit/Dockerfile \
          ./Back.End

        echo "Building Worker Balance..."
        docker build \
          -t balance-worker \
          -f ./Back.End/Worker/Balance/Dockerfile \
          ./Back.End
          
        echo "Building Worker Report..."
        docker build \
          -t report-worker \
          -f ./Back.End/Worker/Report/Dockerfile \
          ./Back.End

        echo "Building Worker Outbox..."
        docker build \
          -t worker-outbox \
          -f ./Back.End/Outbox/Worker/Dockerfile \
          ./Back.End

    - name: Collect Docker/Testcontainers Diagnostics (on failure)
      if: ${{ failure() }}
      shell: bash
      run: |
        set +e
        mkdir -p .ci-diagnostics

        echo "=== Docker version ===" > .ci-diagnostics/docker-version.txt
        docker version >> .ci-diagnostics/docker-version.txt 2>&1

        echo "=== Docker ps -a ===" > .ci-diagnostics/docker-ps.txt
        docker ps -a >> .ci-diagnostics/docker-ps.txt 2>&1

        echo "=== Docker networks ===" > .ci-diagnostics/docker-networks.txt
        docker network ls >> .ci-diagnostics/docker-networks.txt 2>&1

        echo "=== Docker volumes ===" > .ci-diagnostics/docker-volumes.txt
        docker volume ls >> .ci-diagnostics/docker-volumes.txt 2>&1

        echo "=== Resources ===" > .ci-diagnostics/runner-resources.txt
        df -h >> .ci-diagnostics/runner-resources.txt 2>&1
        free -h >> .ci-diagnostics/runner-resources.txt 2>&1

        testcontainers_ids=$(docker ps -aq --filter "label=org.testcontainers")
        for id in $testcontainers_ids; do
          docker inspect "$id" > ".ci-diagnostics/${id}-inspect.json" 2>&1 || true
          docker logs "$id" > ".ci-diagnostics/${id}-logs.txt" 2>&1 || true
        done

    - name: Upload Diagnostics Artifact (on failure)
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: ci-diagnostics-${{ github.run_id }}
        path: .ci-diagnostics
        retention-days: 7
