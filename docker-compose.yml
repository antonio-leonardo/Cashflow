networks:
  cashflow-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongo-data:

services:

  postgres:
    image: postgres:16
    container_name: cashflow-postgres
    restart: always
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cashflow-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: cashflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  mongo:
    image: mongo:7
    container_name: cashflow-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cashflow-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: cashflow-keycloak
    restart: always
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - cashflow-network

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: cashflow-jaeger
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - cashflow-network

  gateway:
    build:
      context: ./Back.End
      dockerfile: Gateway/Dockerfile
    depends_on:
      keycloak:
        condition: service_started
      transaction-api:
        condition: service_started
      balance-query-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Authority: http://keycloak:8080/realms/cashflow
      Keycloak__Audience: cashflow-api
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    ports:
      - "5000:8080"
    networks:
      - cashflow-network
    restart: always

  transaction-api:
    build:
      context: ./Back.End
      dockerfile: Service/Transaction/API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cashflow;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    ports:
      - "5001:8080"
    networks:
      - cashflow-network
    restart: always

  balance-query-api:
    build:
      context: ./Back.End
      dockerfile: Service/Balance/API/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Redis__Connection: redis:6379
      Keycloak__Authority: http://keycloak:8080/realms/cashflow
      Keycloak__Audience: cashflow-api
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    ports:
      - "5002:8080"
    networks:
      - cashflow-network
    restart: always

  worker-outbox:
    build:
      context: ./Back.End
      dockerfile: Outbox/Worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cashflow;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    networks:
      - cashflow-network
    restart: always

  balance-worker:
    build:
      context: ./Back.End
      dockerfile: Worker/Balance/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      Redis__Connection: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    networks:
      - cashflow-network
    restart: always

  report-worker:
    build:
      context: ./Back.End
      dockerfile: Worker/Report/Dockerfile
    depends_on:
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      Mongo__Connection: mongodb://mongo:27017
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    networks:
      - cashflow-network
    restart: always

  audit-worker:
    build:
      context: ./Back.End
      dockerfile: Worker/Audit/Dockerfile
    depends_on:
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      Mongo__Connection: mongodb://mongo:27017
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
    networks:
      - cashflow-network
    restart: always

  k6:
    image: grafana/k6:0.53.0
    profiles:
      - perf
    depends_on:
      transaction-api:
        condition: service_started
    environment:
      BASE_URL: http://transaction-api:8080
      TARGET_RPS: 50
      DURATION: 60s
      PRE_ALLOCATED_VUS: 100
      MAX_VUS: 300
    working_dir: /performance
    command: run k6/transactions-throughput.js
    volumes:
      - ./Back.End/Tests/Performance:/performance
    networks:
      - cashflow-network
