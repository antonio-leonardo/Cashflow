version: "3.9"

networks:
  cashflow-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongo-data:

services:

  postgres:
    image: postgres:16
    container_name: cashflow-postgres
    restart: always
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cashflow-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: cashflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  mongo:
    image: mongo:7
    container_name: cashflow-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cashflow-network

  keycloak:
    image: quay.io/keycloak/keycloak:24
    container_name: cashflow-keycloak
    restart: always
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - cashflow-network
      
    gateway:
      build:
        context: .
        dockerfile: Back.End/Gateway/Dockerfile
      depends_on:
        keycloak:
          condition: service_started
        transaction-api:
          condition: service_started
      environment:
        ASPNETCORE_ENVIRONMENT: Development
        Keycloak__Authority: http://keycloak:8080/realms/cashflow
        Keycloak__Audience: cashflow-api
      ports:
        - "5000:8080"
      networks:
        - cashflow-network
      restart: always

  transaction-api:
    build:
      context: .
      dockerfile: Back.End/Services/Transaction/API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cashflow;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    ports:
      - "5001:8080"
    networks:
      - cashflow-network
    restart: always

  worker-outbox:
    build:
      context: .
      dockerfile: Back.End/Outbox/Worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cashflow;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    networks:
      - cashflow-network
    restart: always

  balance-worker:
    build:
      context: .
      dockerfile: Back.End/Worker/Balance/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      Redis__Connection: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    networks:
      - cashflow-network
    restart: always

  report-worker:
    build:
      context: .
      dockerfile: Back.End/Worker/Report/Dockerfile
    depends_on:
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      Mongo__Connection: mongodb://mongo:27017
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    networks:
      - cashflow-network
    restart: always

  audit-worker:
    build:
      context: .
      dockerfile: Back.End/Worker/Audit/Dockerfile
    depends_on:
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      Mongo__Connection: mongodb://mongo:27017
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    networks:
      - cashflow-network
    restart: always